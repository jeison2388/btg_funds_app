name: btg_funds_app
description: Aplicación de manejo de Fondos FPV/FIC para clientes BTG Pactual.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Persistence
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Navigation
  auto_route: ^10.2.0

  # Dependency injection
  kiwi: ^4.1.0

  # Utilities
  intl: ^0.19.0
  animated_snack_bar: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
